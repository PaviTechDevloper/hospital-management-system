name: Build

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build and Analyze
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ SonarQube Scan
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # ✅ Quality Gate Check
      - name: SonarQube Quality Gate
        id: qualitygate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 🔍 Validate secrets (prevents failure)
      - name: Validate Email Secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.SMTP_USER }}" ] || [ -z "${{ secrets.SMTP_PASS }}" ] || [ -z "${{ secrets.EMAIL_TO }}" ]; then
            echo "missing=true" >> $GITHUB_OUTPUT
          else
            echo "missing=false" >> $GITHUB_OUTPUT
          fi

      # ✅ Email if PASSED
      - name: Send Email on Success
        if: steps.qualitygate.outputs.quality-gate-status == 'PASSED' && steps.check_secrets.outputs.missing == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "✅ SonarQube Passed"
          body: |
            Build Status: PASSED
            Project: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}

            SonarQube Quality Gate PASSED successfully.
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.SMTP_USER }}

      # ❌ Email if FAILED
      - name: Send Email on Failure
        if: steps.qualitygate.outputs.quality-gate-status == 'FAILED' && steps.check_secrets.outputs.missing == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "❌ SonarQube Failed"
          body: |
            Build Status: FAILED
            Project: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}

            SonarQube Quality Gate FAILED. Please check issues.
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.SMTP_USER }}

      # ⚠️ Warning if secrets missing
      - name: Warn if secrets missing
        if: steps.check_secrets.outputs.missing == 'true'
        run: echo "⚠️ Email not sent because SMTP secrets are missing"